name: Release firmware

# Tag a release (v0.2.0) → build, merge a single flashable image, publish it to
# GitHub Pages (same-origin: ESP Web Tools fetches the .bin with fetch(), and
# GitHub *Releases* assets do NOT send CORS headers) and attach it to the Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}

      - name: Install tools
        # esptool pinned to 4.x: v5 renamed merge_bin → merge-bin and
        # --flash_size → --pad-to-size, which would break the merge step.
        run: pip install --upgrade platformio "esptool>=4,<5"

      - name: Build firmware
        working-directory: firmware
        run: pio run -e cyd

      - name: Merge single flashable image
        run: |
          BOOT_APP0=$(find ~/.platformio/packages/framework-arduinoespressif32/tools/partitions -name boot_app0.bin | head -1)
          echo "boot_app0: $BOOT_APP0"
          mkdir -p docs/firmware
          esptool.py --chip esp32 merge_bin \
            -o docs/firmware/merged-firmware.bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            0x1000  firmware/.pio/build/cyd/bootloader.bin \
            0x8000  firmware/.pio/build/cyd/partitions.bin \
            0xe000  "$BOOT_APP0" \
            0x10000 firmware/.pio/build/cyd/firmware.bin
          ls -la docs/firmware/

      - name: Stamp manifest version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev"
          python3 - "$VERSION" <<'PY'
          import json, sys
          p = "docs/firmware/manifest.json"
          m = json.load(open(p))
          m["version"] = sys.argv[1]
          json.dump(m, open(p, "w"), indent=2)
          print("manifest version ->", sys.argv[1])
          PY

      - name: Commit flashable image to Pages (docs/)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/firmware/merged-firmware.bin docs/firmware/manifest.json
          git commit -m "build: firmware ${GITHUB_REF_NAME} for web flasher" || echo "no changes"
          git push origin HEAD:main

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            docs/firmware/merged-firmware.bin
            firmware/.pio/build/cyd/firmware.bin
          body: |
            ### 一鍵燒錄

            用 Chrome / Edge / Firefox 151+ 開 **https://mentosming.github.io/cyd-hk-dash/** 直接燒錄，唔使下載。

            下面嘅 `merged-firmware.bin` 係俾想手動燒錄嘅人（`esptool.py write_flash 0x0 merged-firmware.bin`）。
