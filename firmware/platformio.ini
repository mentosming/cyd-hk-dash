[platformio]
default_envs = cyd
boards_dir = boards

[env:cyd]
platform = espressif32@^6.9.0
board = esp32-2432S028R
framework = arduino
board_build.partitions = huge_app.csv
monitor_speed = 115200
upload_speed = 460800
; port auto-detected — CH340 re-enumerates (11410/11420/...) between plugs
upload_port = /dev/cu.usbserial-*
monitor_port = /dev/cu.usbserial-*
build_flags =
    -Ofast
    -Wall
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO
    ; LVGL (a libdep) must also see include/lv_conf.h, so put include/ on the
    ; global include path (LV_CONF_PATH breaks: the project path has a space)
    -I include
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
lib_deps =
    rzeldent/esp32_smartdisplay@^2.1.1
    h2zero/NimBLE-Arduino@^2.2.1

; Pure-logic unit tests run on the Mac (pio test -e native)
[env:native]
platform = native
build_flags = -std=c++17
build_src_filter = +<model/toll_engine.cpp>
test_build_src = yes
