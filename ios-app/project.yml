name: HKCarDash
options:
  bundleIdPrefix: com.kmai
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: A7YC2GSU54
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  HKCarDash:
    type: application
    platform: iOS
    sources:
      - path: HKCarDash
        excludes: [Info.plist]
      # Shared with the widget extension — one source of truth, no duplication
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: HKCarDash/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.kmai.hkcardash
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: HK CarDash
    entitlements:
      path: HKCarDash/HKCarDash.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.kmai.hkcardash
    dependencies:
      - target: HKCarDashWidgets
        embed: true

  HKCarDashWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: HKCarDashWidgets
        excludes: [Info.plist]
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kmai.hkcardash.widgets
        INFOPLIST_FILE: HKCarDashWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
    entitlements:
      path: HKCarDashWidgets/HKCarDashWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.kmai.hkcardash

  HKCarDashTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HKCarDashTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: HKCarDash

schemes:
  HKCarDash:
    build:
      targets:
        HKCarDash: all
        HKCarDashWidgets: all
        HKCarDashTests: [test]
    test:
      targets: [HKCarDashTests]
    run: {}
    archive: {}
